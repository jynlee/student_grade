# =============================================================================
# db.properties - 데이터베이스 접속 설정 파일
# =============================================================================
# 이 파일은 root-context.xml의 PropertyPlaceholderConfigurer가 읽어들입니다.
# XML 파일에서 ${db.driver}, ${db.url} 같은 표현식을 실제 값으로 치환합니다.
#
# 파일 위치: src/main/resources/db.properties
# Maven 빌드 후 위치: WEB-INF/classes/db.properties (classpath 루트)
#
# [보안 주의]
# 실제 운영 환경에서는 이 파일을 Git에 올리지 마세요! (.gitignore에 추가 권장)
# 비밀번호 같은 민감한 정보는 환경변수나 별도의 시크릿 관리 도구를 사용하세요.
# =============================================================================

# -----------------------------------------------------------------------------
# JDBC 드라이버 클래스명
# PostgreSQL JDBC 드라이버의 클래스 경로입니다.
# pom.xml에 postgresql 의존성을 추가하면 이 클래스가 classpath에 등록됩니다.
# -----------------------------------------------------------------------------
db.driver=org.postgresql.Driver

# -----------------------------------------------------------------------------
# JDBC URL - 데이터베이스 서버 접속 주소
# 형식: jdbc:postgresql://호스트:포트/데이터베이스명
#
# - 호스트: postgres (Docker Compose 사용 시 서비스 이름, 로컬이면 localhost)
# - 포트: 5432 (PostgreSQL 기본 포트)
# - 데이터베이스: studentdb (미리 생성되어 있어야 합니다)
# -----------------------------------------------------------------------------
db.url=jdbc:postgresql://postgres:5432/studentdb

# -----------------------------------------------------------------------------
# 데이터베이스 접속 계정 (username)
# PostgreSQL에서 미리 생성된 사용자 이름입니다.
# -----------------------------------------------------------------------------
db.username=student

# -----------------------------------------------------------------------------
# 데이터베이스 접속 비밀번호 (password)
# -----------------------------------------------------------------------------
db.password=student123
